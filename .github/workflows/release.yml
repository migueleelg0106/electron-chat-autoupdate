name: Build and publish release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish, for example v1.1.5"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run dist

      - name: Create GitHub Release with generated notes
        shell: pwsh
        run: |
          $releaseTag = "${{ github.ref_name }}"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $releaseTag = "${{ inputs.tag }}"
          }

          $assets = @(
            Get-ChildItem -Path dist -File -Filter "*.exe"
            Get-ChildItem -Path dist -File -Filter "*.blockmap"
            Get-ChildItem -Path dist -File -Filter "latest.yml"
          )

          gh release create "$releaseTag" @($assets.FullName) --title "$releaseTag" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
